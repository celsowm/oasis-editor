name: Publish npm Package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-main
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Decide publish version
        id: versioning
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if LATEST_VERSION="$(npm view "${PACKAGE_NAME}" version 2>/dev/null)"; then
            node -e "
              const latest = process.argv[1].split('.').map(Number);
              if (latest.length !== 3 || latest.some((part) => !Number.isInteger(part))) {
                throw new Error('Unsupported npm version: ' + process.argv[1]);
              }
              latest[2] += 1;
              console.log(latest.join('.'));
            " "${LATEST_VERSION}" > .next-version
            NEXT_VERSION="$(cat .next-version)"
            npm version "${NEXT_VERSION}" -m "chore(release): v%s [skip ci]"
            echo "publish_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "release_mode=registry-bump" >> "$GITHUB_OUTPUT"
          else
            git add package.json package-lock.json
            if ! git diff --cached --quiet; then
              git commit -m "chore(release): v${PACKAGE_VERSION} [skip ci]"
            fi
            if ! git rev-parse "v${PACKAGE_VERSION}" >/dev/null 2>&1; then
              git tag "v${PACKAGE_VERSION}"
            fi
            echo "publish_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "release_mode=initial" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build:lib

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags
