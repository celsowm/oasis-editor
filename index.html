<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oasis-editor</title>
    <link rel="stylesheet" href="/src/styles/components/ColorPicker.css" />
    <link rel="stylesheet" href="/src/styles/components/TablePicker.css" />
    <link rel="stylesheet" href="/src/styles/components/Ruler.css" />
  </head>
  <body>
    <div class="oasis-editor-shell">
      <header class="oasis-editor-header">
        <div class="oasis-editor-brand">
          <div class="oasis-editor-logo"></div>
          <div class="oasis-editor-title-container">
            <input type="text" class="oasis-editor-document-title" value="Untitled document" />
            <div class="oasis-editor-menu-bar">
              <span id="oasis-editor-menu-file">File</span>
              <input type="file" id="oasis-editor-import-docx-input" accept=".docx" style="display: none;" />
              <span id="oasis-editor-menu-edit">Edit</span>
              <span id="oasis-editor-menu-view">View</span>
              <span id="oasis-editor-menu-insert">Insert</span>
              <span id="oasis-editor-menu-format">Format</span>
              <span id="oasis-editor-menu-tools">Tools</span>
              <span id="oasis-editor-menu-extensions">Extensions</span>
              <span id="oasis-editor-menu-help">Help</span>
            </div>
          </div>
        </div>
      </header>

      <div class="oasis-editor-toolbar">
        <div class="oasis-editor-toolbar-group">
          <button id="oasis-editor-undo" title="Undo (Ctrl+Z)" type="button"><i data-lucide="undo"></i></button>
          <button id="oasis-editor-redo" title="Redo (Ctrl+Y)" type="button"><i data-lucide="redo"></i></button>
          <button id="oasis-editor-print" title="Print" type="button"><i data-lucide="printer"></i></button>
        </div>

        <div class="oasis-editor-toolbar-separator"></div>

        <div class="oasis-editor-toolbar-group">
          <button id="oasis-editor-format-painter" title="Format Painter" type="button" class="oasis-editor-toolbar-btn"><i data-lucide="paintbrush"></i></button>
        </div>

        <div class="oasis-editor-toolbar-separator"></div>

        <div class="oasis-editor-toolbar-group">
          <select id="oasis-editor-zoom">
            <option value="100%">100%</option>
            <option value="fit">Fit</option>
          </select>
        </div>

        <div class="oasis-editor-toolbar-separator"></div>

        <div class="oasis-editor-toolbar-group">
          <select id="oasis-editor-template"></select>
        </div>

        <div class="oasis-editor-toolbar-separator"></div>

        <div class="oasis-editor-toolbar-group">
          <button id="oasis-editor-bold" title="Bold (Ctrl+B)" type="button"><i data-lucide="bold"></i></button>
          <button id="oasis-editor-italic" title="Italic (Ctrl+I)" type="button"><i data-lucide="italic"></i></button>
          <button id="oasis-editor-underline" title="Underline (Ctrl+U)" type="button"><i data-lucide="underline"></i></button>
          <button id="oasis-editor-strikethrough" title="Strikethrough" type="button"><i data-lucide="strikethrough"></i></button>
          <button id="oasis-editor-superscript" title="Superscript" type="button"><i data-lucide="superscript"></i></button>
          <button id="oasis-editor-subscript" title="Subscript" type="button"><i data-lucide="subscript"></i></button>
          <button id="oasis-editor-link" title="Insert Link" type="button"><i data-lucide="link"></i></button>
          <div id="oasis-editor-color-picker-container"></div>
          <button id="oasis-editor-track-changes" title="Track Changes" type="button"><i data-lucide="eye"></i></button>
        </div>

        <div class="oasis-editor-toolbar-separator"></div>

        <div class="oasis-editor-toolbar-group">
          <select id="oasis-editor-style-select" title="Paragraph style" style="padding: 4px 8px; font-size: 13px; border-radius: 4px; border: 1px solid #d1d5db; background: white;">
            <option value="">Normal</option>
            <option value="Heading1">Heading 1</option>
            <option value="Heading2">Heading 2</option>
            <option value="Heading3">Heading 3</option>
            <option value="Heading4">Heading 4</option>
            <option value="Heading5">Heading 5</option>
            <option value="Heading6">Heading 6</option>
          </select>
        </div>

        <div class="oasis-editor-toolbar-group">
          <button id="oasis-editor-align-left" title="Align left" type="button"><i data-lucide="align-left"></i></button>
          <button id="oasis-editor-align-center" title="Align center" type="button"><i data-lucide="align-center"></i></button>
          <button id="oasis-editor-align-right" title="Align right" type="button"><i data-lucide="align-right"></i></button>
          <button id="oasis-editor-align-justify" title="Justify" type="button"><i data-lucide="align-justify"></i></button>
          <button id="oasis-editor-bullets" title="Bulleted list" type="button"><i data-lucide="list"></i></button>
          <button id="oasis-editor-ordered-list" title="Numbered list" type="button"><i data-lucide="list-ordered"></i></button>
          <button id="oasis-editor-decrease-indent" title="Decrease indent" type="button"><i data-lucide="outdent"></i></button>
          <button id="oasis-editor-increase-indent" title="Increase indent" type="button"><i data-lucide="indent"></i></button>
        </div>

        <div class="oasis-editor-toolbar-group">
          <button id="oasis-editor-insert-image" title="Insert Image" type="button"><i data-lucide="image"></i></button>
          <input type="file" id="oasis-editor-image-input" accept="image/*" style="display: none;" />
          <button id="oasis-editor-insert-table" title="Insert Table" type="button"><i data-lucide="table"></i></button>
        </div>
      </div>

      <main id="oasis-editor-app" class="oasis-editor-main">
        <div id="oasis-editor-ruler"></div>
        <section id="oasis-editor-pages" class="oasis-editor-pages"></section>
      </main>

      <div id="oasis-editor-input-container" style="position: fixed; left: -1000px; top: -1000px; width: 1px; height: 1px; overflow: hidden;">
        <textarea id="oasis-editor-input"></textarea>
      </div>

      <footer class="oasis-editor-footer-status">
        <span id="oasis-editor-status">Ready</span>
        <span id="oasis-editor-metrics"></span>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
