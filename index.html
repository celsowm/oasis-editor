<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oasis-editor</title>
  </head>
  <body>
    <div class="oasis-editor-shell">
      <header class="oasis-editor-toolbar">
        <div class="oasis-editor-brand">
          <strong>oasis-editor</strong>
          <span>clean document model + composition + pagination</span>
        </div>

        <div class="oasis-editor-controls">
          <select id="oasis-editor-template"></select>
          <button id="oasis-editor-add-paragraph" type="button">Add paragraph</button>
          <button id="oasis-editor-add-batch" type="button">Add batch</button>
          <button id="oasis-editor-repaginate" type="button">Repaginate</button>
          <button id="oasis-editor-export" type="button">Export JSON</button>
        </div>
      </header>

      <section class="oasis-editor-meta">
        <div class="oasis-editor-card"><span>Revision</span><strong id="oasis-editor-revision">0</strong></div>
        <div class="oasis-editor-card"><span>Pages</span><strong id="oasis-editor-pages-count">0</strong></div>
        <div class="oasis-editor-card"><span>Sections</span><strong id="oasis-editor-sections-count">0</strong></div>
        <div class="oasis-editor-card"><span>Template</span><strong id="oasis-editor-template-name">-</strong></div>
        <div class="oasis-editor-card"><span>Backend</span><strong id="oasis-editor-backend">-</strong></div>
      </section>

      <div id="oasis-editor-status" class="oasis-editor-status">Ready</div>

      <main id="oasis-editor-app" class="oasis-editor-main">
        <aside class="oasis-editor-sidebar">
          <h2>Architecture notes</h2>
          <ul id="oasis-editor-notes" class="oasis-editor-notes"></ul>
        </aside>
        <section id="oasis-editor-pages" class="oasis-editor-pages"></section>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
